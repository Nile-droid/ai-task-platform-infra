apiVersion: v1
kind: Namespace
metadata:
  name: task-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: task-platform
data:
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  MONGODB_URI: "mongodb://mongodb-service:27017/task-platform"
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: task-platform
type: Opaque
stringData:
  JWT_SECRET: "your-super-secret-jwt-key-prod"
